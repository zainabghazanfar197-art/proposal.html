<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Little Question ❤️</title>
    <style>
        body {
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 150px;
        }

        .box {
            background: white;
            width: 450px;
            margin: auto;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }

        h1 {
            color: #ff4d6d;
        }

        button {
            padding: 12px 30px;
            margin: 20px;
            font-size: 18px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
        }

        #yes {
            background-color: #ff4d6d;
            color: white;
        }

        #no {
            background-color: #666;
            color: white;
        }

        #message {
            margin-top: 25px;
            font-size: 22px;
            color: #ff4d6d;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>Will You Be Mine Forever? ❤️</h1>
    <p>You are the reason behind my smile.<br>
       My heart chose you, and it keeps choosing you every day.</p>

    <button id="yes" onclick="yesAnswer()">Yes ❤️</button>
    <button id="no" onclick="noAnswer()">No 💔</button>

    <p id="message"></p>
</div>

<script>
    function yesAnswer() {
        document.getElementById("message").innerHTML =
            "Yay! ❤️ You just made me the happiest person!";
    }

    function noAnswer() {
        document.getElementById("message").innerHTML =
            "No matter your answer, you'll always be special to me. 😊";
    }
</script>

</body>
</html>
